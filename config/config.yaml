# AeroRL: F1 Aerodynamics Optimization Configuration
# v2 — Tuned hyperparameters for improved training stability and convergence

# Project paths
paths:
  models_dir: "models"
  simulations_dir: "simulations"
  results_dir: "results"
  logs_dir: "results/logs"
  cfd_output: "results/cfd_output"

# Reinforcement Learning Configuration
rl:
  # Algorithm settings
  algorithm: "PPO"  # Options: PPO, SAC, DDPG
  learning_rate: 0.0001          # ↓ from 0.0003 — slower but more stable convergence
  discount_factor: 0.995         # ↑ from 0.99  — longer horizon for aero optimization
  gae_lambda: 0.97               # ↑ from 0.95  — less bias in advantage estimates
  clip_ratio: 0.15               # ↓ from 0.2   — more conservative policy updates
  entropy_coef: 0.03             # ↑ from 0.01  — more exploration to find better configs
  value_coef: 0.5
  max_grad_norm: 0.5
  
  # Network architecture
  policy_network:
    hidden_layers: [512, 256]    # ↑ from [256, 256] — more capacity for complex aero relationships
    activation: "tanh"
  value_network:
    hidden_layers: [512, 256]    # ↑ from [256, 256] — better value estimation
    activation: "tanh"
    
  # Training parameters
  training:
    total_timesteps: 1000000
    batch_size: 128              # ↑ from 64 — smoother gradient estimates
    epochs: 8                    # ↓ from 10 — avoid overfitting each rollout
    save_frequency: 50000
    eval_frequency: 10000
    random_seed: 42

# Environment Configuration
environment:
  # Observation space parameters (aerodynamic measurements)
  observation_space:
    - pressure_coefficients
    - velocity_fields
    - drag_coefficient
    - downforce_coefficient
    - flow_separation
  
  # Action space parameters (aerodynamic component adjustments)
  action_space:
    # Front wing parameters
    front_wing:
      angle_min: -10.0  # degrees
      angle_max: 10.0
    
    # Rear wing parameters
    rear_wing:
      angle_min: 0.0
      angle_max: 15.0
    
    # Diffuser parameters
    diffuser:
      height_min: 50.0  # mm
      height_max: 100.0
    
    # Floor parameters
    floor:
      ride_height_min: 10.0  # mm
      ride_height_max: 50.0
  
  # Reward function weights (v2 — redesigned for normalized rewards)
  rewards:
    # Primary objective: maximize aerodynamic efficiency (downforce/drag)
    efficiency_target: 1.5           # Target efficiency to aim for
    efficiency_weight: 5.0           # Weight for efficiency component
    
    # Secondary: keep drag low
    drag_penalty: -2.0               # Penalize high drag
    drag_baseline: 0.32              # Baseline Cd (reward for going below)
    
    # Secondary: maximize downforce
    downforce_weight: 1.5            # Reward for high downforce
    downforce_baseline: 0.35         # Baseline downforce
    
    # Improvement bonuses
    efficiency_improvement_bonus: 3.0  # Bonus for beating previous efficiency
    new_best_bonus: 1.0                # Bonus for new all-time best
    
    # Penalties
    smoothness_penalty: -0.5         # Penalize large parameter oscillations
    illegal_state_penalty: -2.0      # Penalty for invalid configurations (reduced, since we clip)

# CFD Simulation Configuration
cfd:
  # Simulation parameters
  solver: "OpenFOAM"  # Options: OpenFOAM, Fluent, etc.
  turbulence_model: "k-omega SST"
  mesh_resolution: "medium"  # Options: coarse, medium, fine
  
  # Wind tunnel parameters
  wind_tunnel:
    velocity: 50.0  # m/s
    temperature: 293.15  # K
    pressure: 101325.0  # Pa
    
  # Simulation control
  max_iterations: 500
  convergence_criteria: 1e-4
  parallel_processes: 8
  
  # Geometry parameters
  geometry:
    scale: 1.0  # 1:1 scale
    reference_area: 1.5  # m^2
    reference_length: 5.0  # m

# Visualization Configuration
visualization:
  plot_frequency: 100  # Update plots every x iterations
  save_images: true
  save_animations: true
  colormap: "jet"

# System Configuration
system:
  random_seed: 42
  num_cpu_cores: 8
  gpu_enabled: true
  debug_mode: false