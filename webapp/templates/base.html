<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AeroRL{% endblock %} — Wind Tunnel Dashboard</title>
    <meta name="description" content="AI-Powered F1 Aerodynamics Optimization Dashboard">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>

    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a2234;
            --bg-card-hover: #1f2a40;
            --border: #2a3550;
            --text-primary: #e8edf5;
            --text-secondary: #8b95a8;
            --text-muted: #5a6478;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --green: #10b981;
            --green-glow: rgba(16, 185, 129, 0.15);
            --red: #ef4444;
            --red-glow: rgba(239, 68, 68, 0.15);
            --amber: #f59e0b;
            --purple: #8b5cf6;
            --cyan: #06b6d4;
            --nav-height: 64px;
            --radius: 12px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ── Navigation ──── */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--nav-height);
            background: rgba(10, 14, 23, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 18px;
            color: var(--text-primary);
            text-decoration: none;
            margin-right: 40px;
        }

        .nav-brand .logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), var(--cyan));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .nav-links {
            display: flex;
            gap: 4px;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-links a:hover {
            color: var(--text-primary);
            background: var(--bg-card);
        }

        .nav-links a.active {
            color: var(--accent);
            background: var(--accent-glow);
        }

        /* ── Main Content ──── */
        main {
            margin-top: var(--nav-height);
            padding: 32px 24px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 15px;
        }

        /* ── Cards ──── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .card h3 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        /* ── Grid ──── */
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }

        @media (max-width: 900px) {
            .grid-2, .grid-3, .grid-4 {
                grid-template-columns: 1fr;
            }
        }

        /* ── Metric Cards ──── */
        .metric-value {
            font-size: 32px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .metric-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .metric-good { color: var(--green); }
        .metric-warn { color: var(--amber); }
        .metric-bad { color: var(--red); }

        /* ── Gauge ──── */
        .gauge-bar {
            width: 100%;
            height: 6px;
            background: var(--bg-primary);
            border-radius: 3px;
            margin-top: 12px;
            overflow: hidden;
        }

        .gauge-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .gauge-fill.blue { background: linear-gradient(90deg, var(--accent), var(--cyan)); }
        .gauge-fill.green { background: linear-gradient(90deg, var(--green), #34d399); }
        .gauge-fill.red { background: linear-gradient(90deg, var(--red), #f87171); }
        .gauge-fill.amber { background: linear-gradient(90deg, var(--amber), #fbbf24); }

        /* ── Sliders ──── */
        .slider-group {
            margin-bottom: 20px;
        }

        .slider-group label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .slider-group label span {
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            background: var(--bg-primary);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid var(--bg-card);
            box-shadow: 0 0 8px var(--accent-glow);
            transition: transform 0.15s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* ── Buttons ──── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .btn-outline {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-outline:hover {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        /* ── Table ──── */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        th {
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.05em;
        }

        td {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        /* ── Utilities ──── */
        .gap-y { margin-bottom: 24px; }
        .text-mono { font-family: 'JetBrains Mono', monospace; }
        .text-center { text-align: center; }
        .flex { display: flex; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .gap-8 { gap: 8px; }
        .mt-16 { margin-top: 16px; }
        .mb-24 { margin-bottom: 24px; }

        /* ── Chart container ──── */
        .chart-container {
            position: relative;
            width: 100%;
            height: 300px;
        }

        /* ── Animations ──── */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card { animation: fadeIn 0.3s ease; }
        .card:nth-child(2) { animation-delay: 0.05s; }
        .card:nth-child(3) { animation-delay: 0.1s; }
        .card:nth-child(4) { animation-delay: 0.15s; }
    </style>
</head>
<body>

<nav>
    <a href="/" class="nav-brand">
        <div class="logo">🏎</div>
        AeroRL
    </a>
    <div class="nav-links">
        <a href="/" id="nav-dashboard">Dashboard</a>
        <a href="/wind-tunnel" id="nav-wind-tunnel">Wind Tunnel</a>
        <a href="/compare" id="nav-compare">Compare</a>
        <a href="/training" id="nav-training">Training</a>
    </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<script>
    // Highlight active nav link
    const path = window.location.pathname;
    const navMap = {
        '/': 'nav-dashboard',
        '/wind-tunnel': 'nav-wind-tunnel',
        '/compare': 'nav-compare',
        '/training': 'nav-training',
    };
    const activeId = navMap[path];
    if (activeId) {
        document.getElementById(activeId)?.classList.add('active');
    }

    // Shared Chart.js defaults
    Chart.defaults.color = '#8b95a8';
    Chart.defaults.borderColor = '#2a3550';
    Chart.defaults.font.family = "'Inter', sans-serif";
</script>

{% block scripts %}{% endblock %}
</body>
</html>
